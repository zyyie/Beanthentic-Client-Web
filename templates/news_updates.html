<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socials | Beanthentic</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <header class="top-header top-header--history">
      <div class="container nav-wrapper nav-wrapper--history">
        <a class="nav-back" href="{{ url_for('home') }}" aria-label="Back to homepage">
          <svg
            class="nav-back-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
            focusable="false"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </a>
        <div class="nav-title">Socials</div>
      </div>
    </header>

    <main class="profiles-page">
      <section class="container">
        <div class="connect-with-us" aria-label="Beanthentic Facebook feed">
          <h3>CONNECT WITH US</h3>
          <div class="fb-embed-wrap">
            <iframe
              class="fb-embed-frame"
              title="Beanthentic Coffee Facebook page"
              loading="lazy"
              src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fprofile.php%3Fid%3D61588902651094&tabs=timeline&width=460&height=620&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true"
              referrerpolicy="strict-origin-when-cross-origin"
              allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
            ></iframe>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
